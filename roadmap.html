  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  font-weight: 700;\n  font-display: swap;\n  src: url(\"27434d50-afb1-4a2c-9336-110880e53da8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ccb71ce8-0a12-4316-aac9-5d4661c37048\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"56fb343b-141c-4c56-bfdd-9151b02a055d\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"770e4420-dfbe-4e7e-bb4b-d29f8e88bee3\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"924185b4-8363-4c3b-a172-52a00c411e86\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"1d4ccc20-214c-41ae-8ff9-db9a5f6cb845\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"27434d50-afb1-4a2c-9336-110880e53da8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ccb71ce8-0a12-4316-aac9-5d4661c37048\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n    <style>\n        /* ─── RESET ─────────────────────────────────────────── */\n        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n        /* ─── TOKENS ─────────────────────────────────────────── */\n        :root {\n            --canvas:    #0F0F23;\n            --surface:   #1A1A2E;\n            --violet:    #8B5CF6;\n            --gold:      #F5A623;\n            --rose:      #F43F5E;\n            --white:     #FFFFFF;\n            --secondary: #A1A1AA;\n            --rule:      #2A2A4A;\n            --max-w:     1200px;\n        }\n\n        /* ─── BASE ───────────────────────────────────────────── */\n        html { font-size: 16px; scroll-behavior: smooth; }\n\n        body {\n            background-color: var(--canvas);\n            background-image:\n                linear-gradient(rgba(139, 92, 246, 0.12) 1px, transparent 1px),\n                linear-gradient(90deg, rgba(139, 92, 246, 0.12) 1px, transparent 1px);\n            background-size: 24px 24px;\n            background-attachment: fixed;\n            color: var(--white);\n            font-family: 'Manrope', sans-serif;\n            line-height: 1.6;\n            min-height: 100vh;\n            padding-right: 14px; /* clear gold rail */\n        }\n\n        /* ─── GOLD RAIL ──────────────────────────────────────── */\n        .gold-rail {\n            position: fixed;\n            top: 0;\n            right: 0;\n            width: 2px;\n            height: 100vh;\n            background: var(--gold);\n            opacity: 0.75;\n            z-index: 200;\n        }\n\n        /* ─── LAYOUT ─────────────────────────────────────────── */\n        .container {\n            max-width: var(--max-w);\n            margin: 0 auto;\n            padding: 0 48px;\n        }\n\n        /* ─── §1 HEADER ──────────────────────────────────────── */\n        .site-header {\n            padding: 32px 0 30px;\n            border-bottom: 1px solid var(--violet);\n        }\n\n        .header-chrome {\n            display: flex;\n            align-items: center;\n            justify-content: space-between;\n            margin-bottom: 22px;\n        }\n\n        .header-left {\n            display: flex;\n            align-items: center;\n            gap: 14px;\n        }\n\n        .wordmark {\n            display: block;\n            height: 28px;\n            width: auto;\n        }\n\n        .roadmap-badge {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 10px;\n            font-weight: 500;\n            letter-spacing: 0.20em;\n            text-transform: uppercase;\n            color: var(--gold);\n            border: 1px solid var(--gold);\n            padding: 4px 9px;\n            border-radius: 2px;\n            line-height: 1;\n        }\n\n        .date-stamp {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 11px;\n            color: var(--secondary);\n            letter-spacing: 0.10em;\n        }\n\n        .page-title {\n            font-family: 'Manrope', sans-serif;\n            font-weight: 700;\n            font-size: 36px;\n            color: var(--white);\n            line-height: 1.15;\n            margin-bottom: 10px;\n            text-wrap: balance;\n        }\n\n        .page-subtitle {\n            font-family: 'Manrope', sans-serif;\n            font-style: italic;\n            font-size: 14px;\n            color: var(--secondary);\n            max-width: 600px;\n            line-height: 1.6;\n        }\n\n        /* ─── §2 CONTEXT BLOCK ───────────────────────────────── */\n        .context-section {\n            padding: 48px 0;\n            border-bottom: 1px solid var(--rule);\n        }\n\n        .context-grid {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 28px;\n        }\n\n        /* Panels */\n        .panel {\n            background: var(--surface);\n            padding: 28px 28px 26px;\n            border-radius: 2px;\n        }\n\n        .panel--violet { border-left: 2px solid var(--violet); }\n        .panel--gold   { border-left: 2px solid var(--gold); }\n\n        .panel-label {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 10px;\n            letter-spacing: 0.18em;\n            text-transform: uppercase;\n            color: var(--secondary);\n            margin-bottom: 18px;\n            display: block;\n        }\n\n        .panel-label--gold { color: var(--gold); }\n\n        /* Left panel body */\n        .panel-body {\n            font-size: 14px;\n            line-height: 1.75;\n            color: var(--white);\n        }\n\n        .panel-body p + p { margin-top: 10px; }\n\n        .anchor-note {\n            display: inline-block;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 11px;\n            color: var(--secondary);\n            margin-top: 16px;\n            padding: 8px 12px;\n            border: 1px solid var(--rule);\n            border-radius: 2px;\n            line-height: 1.7;\n            width: 100%;\n        }\n\n        .anchor-note strong {\n            color: var(--violet);\n            font-weight: 500;\n        }\n\n        /* Right panel — raise terms */\n        .raise-terms {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 11px;\n            color: var(--secondary);\n            padding: 11px 14px;\n            border: 1px solid var(--rule);\n            border-radius: 2px;\n            margin-bottom: 24px;\n            line-height: 1.85;\n        }\n\n        .raise-terms .term-label {\n            color: var(--gold);\n            font-weight: 500;\n        }\n\n        /* Trigger list */\n        .trigger-list {\n            list-style: none;\n            display: flex;\n            flex-direction: column;\n            gap: 18px;\n        }\n\n        .trigger-item {\n            display: flex;\n            gap: 14px;\n            align-items: flex-start;\n        }\n\n        .trigger-num {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 14px;\n            font-weight: 700;\n            color: var(--gold);\n            min-width: 20px;\n            line-height: 1.4;\n            flex-shrink: 0;\n        }\n\n        .trigger-body { flex: 1; }\n\n        .trigger-name {\n            font-family: 'Manrope', sans-serif;\n            font-size: 13px;\n            font-weight: 600;\n            color: var(--white);\n            line-height: 1.4;\n            margin-bottom: 3px;\n        }\n\n        .trigger-desc {\n            font-size: 12px;\n            color: var(--secondary);\n            line-height: 1.55;\n        }\n\n        /* Rose callout */\n        .rose-callout {\n            margin-top: 22px;\n            border-left: 2px solid var(--rose);\n            padding: 9px 12px;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 10.5px;\n            color: var(--rose);\n            letter-spacing: 0.05em;\n            line-height: 1.7;\n        }\n\n        /* ─── §3 TIMELINE ────────────────────────────────────── */\n\n        .timeline-section {\n            padding: 56px 0 48px;\n            border-bottom: 1px solid var(--rule);\n        }\n\n        /* Track banners */\n        .track-banner {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9.5px;\n            letter-spacing: 0.15em;\n            text-transform: uppercase;\n            padding: 9px 2px;\n            line-height: 1;\n        }\n\n        .track-banner--product {\n            color: var(--violet);\n            background: rgba(139, 92, 246, 0.06);\n            border-bottom: 1px dotted rgba(139, 92, 246, 0.3);\n            padding-left: 10px;\n        }\n\n        .track-banner--revenue {\n            color: var(--gold);\n            background: rgba(245, 166, 35, 0.06);\n            border-top: 1px dotted rgba(245, 166, 35, 0.3);\n            padding-left: 10px;\n        }\n\n        /* Six-column grid: Q3 2026 gets 1.4× width (holds 3 nodes) */\n        .track-row,\n        .axis-row {\n            display: grid;\n            grid-template-columns: 1.4fr repeat(5, 1fr);\n        }\n\n        .track-row--product {\n            min-height: 200px;\n            background: linear-gradient(to bottom,\n                rgba(139, 92, 246, 0.05) 0%,\n                rgba(139, 92, 246, 0.01) 100%);\n        }\n\n        .track-row--revenue {\n            min-height: 160px;\n            background: linear-gradient(to top,\n                rgba(245, 166, 35, 0.05) 0%,\n                rgba(245, 166, 35, 0.01) 100%);\n        }\n\n        /* Track columns */\n        .track-col {\n            position: relative;\n            border-left: 1px dashed rgba(139, 92, 246, 0.15);\n            min-width: 0;\n            padding: 12px 10px 0;\n        }\n\n        .track-col:first-child { border-left: none; }\n\n        .track-col--y2 {\n            border-left-style: dotted;\n            border-left-color: rgba(139, 92, 246, 0.08);\n            opacity: 0.42;\n        }\n\n        /* Period labels — desktop hidden, mobile shown */\n        .col-label { display: none; }\n\n        /* Spine callout */\n        .spine-callout {\n            text-align: right;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9.5px;\n            font-style: italic;\n            color: var(--secondary);\n            letter-spacing: 0.04em;\n            padding: 10px 2px 4px;\n            opacity: 0.6;\n        }\n\n        /* Axis */\n        .axis-row {\n            border-top: 1px solid var(--gold);\n        }\n\n        .axis-col {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9.5px;\n            text-transform: uppercase;\n            letter-spacing: 0.10em;\n            color: var(--gold);\n            text-align: center;\n            padding: 7px 4px 5px;\n            position: relative;\n        }\n\n        .axis-col:not(:first-child)::before {\n            content: '';\n            position: absolute;\n            left: 0;\n            top: -5px;\n            height: 5px;\n            width: 1px;\n            background: var(--gold);\n            opacity: 0.5;\n        }\n\n        .axis-col--y2 {\n            opacity: 0.35;\n            font-style: italic;\n        }\n\n        /* Tranche-2 bracket */\n        .tranche-row {\n            display: flex;\n            margin-top: 3px;\n            margin-bottom: 2px;\n        }\n\n        .tranche-bracket {\n            margin-left: 0;\n            flex: 0 0 37.5%;   /* Q3 2026 (1.4fr) + Q4 2026 (1fr) = 2.4/6.4 total */\n            border-top: 1px solid rgba(139, 92, 246, 0.55);\n            position: relative;\n            padding: 6px 0 0;\n            text-align: center;\n        }\n\n        .tranche-bracket::before,\n        .tranche-bracket::after {\n            content: '';\n            position: absolute;\n            top: -4px;\n            width: 1px;\n            height: 4px;\n            background: rgba(139, 92, 246, 0.55);\n        }\n\n        .tranche-bracket::before { left: 0; }\n        .tranche-bracket::after  { right: 0; }\n\n        .tranche-label {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 8.5px;\n            text-transform: uppercase;\n            letter-spacing: 0.13em;\n            color: var(--violet);\n            font-style: italic;\n            opacity: 0.75;\n        }\n\n        /* ─── PRESENT STATE ANCHOR ───────────────────────────── */\n\n        .track-col--present {\n            border-right: 1px solid rgba(245, 166, 35, 0.38);\n        }\n\n        .axis-col--present {\n            padding: 0 10px 0 0;\n            overflow: visible;\n            position: relative;\n            border-right: 1px solid rgba(245, 166, 35, 0.38);\n            text-align: left;\n        }\n\n        .present-label {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 8px;\n            text-transform: uppercase;\n            letter-spacing: 0.14em;\n            color: var(--gold);\n            white-space: nowrap;\n            margin-bottom: 6px;\n            display: block;\n        }\n\n        .present-lines {\n            display: flex;\n            flex-direction: column;\n            gap: 4px;\n        }\n\n        .present-line {\n            font-family: 'Manrope', sans-serif;\n            font-size: 8.5px;\n            color: var(--secondary);\n            line-height: 1.35;\n        }\n\n        .present-arrow-label {\n            position: absolute;\n            right: 4px;\n            top: 50%;\n            transform: translateY(-50%);\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 7px;\n            font-style: italic;\n            color: rgba(245, 166, 35, 0.6);\n            white-space: nowrap;\n        }\n\n        /* Shrink present-line slightly for longer content */\n        .present-line { font-size: 8px; }\n\n        /* ─── T2 TRIGGER RINGS ───────────────────────────────── */\n\n        /* Wrapper keeps the badge positioned relative to the dot */\n        .dot-wrap {\n            position: relative;\n            align-self: center;\n            flex-shrink: 0;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n        }\n\n        /* Gold ring + dark gap + glow on standard dots (02, 06) */\n        .node-dot.t2-trigger {\n            box-shadow:\n                0 0 0 3px var(--canvas),\n                0 0 0 5.5px var(--gold),\n                0 0 10px rgba(245, 166, 35, 0.35);\n        }\n\n        /* Gold ring for bridge dot 03 — sits outside the violet ring */\n        .bridge-dot.t2-trigger::before {\n            content: '';\n            position: absolute;\n            inset: -9px;\n            border-radius: 50%;\n            border: 2px solid var(--gold);\n            box-shadow: 0 0 8px rgba(245, 166, 35, 0.32);\n            z-index: 4;\n        }\n\n        /* T2 badge */\n        .t2-badge {\n            position: absolute;\n            top: -10px;\n            right: -10px;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 6px;\n            font-weight: 700;\n            color: var(--gold);\n            letter-spacing: 0.05em;\n            line-height: 1;\n            white-space: nowrap;\n        }\n\n        .dot-wrap--bridge .t2-badge {\n            top: -14px;\n            right: -14px;\n        }\n\n        /* Gold drop-line on t2 node ticks */\n        .t2-drop {\n            background: rgba(245, 166, 35, 0.25) !important;\n        }\n\n        /* ─── SPINE CALLOUTS ─────────────────────────────────── */\n\n        .callout {\n            display: none !important;\n            position: absolute;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 7px;\n            font-style: italic;\n            color: rgba(161, 161, 170, 0.6);\n            line-height: 1.4;\n            pointer-events: none;\n            z-index: 3;\n        }\n\n        .callout::after {\n            content: '';\n            position: absolute;\n            background: rgba(245, 166, 35, 0.38);\n        }\n\n        .callout--right::after {\n            height: 1px;\n            width: 16px;\n            right: -16px;\n            top: 50%;\n            transform: translateY(-50%);\n        }\n\n        .callout--left::after {\n            height: 1px;\n            width: 16px;\n            left: -16px;\n            top: 50%;\n            transform: translateY(-50%);\n        }\n\n        /* ─── STATUS STRIP (between §2 and §3) ─────────────── */\n\n        .status-strip {\n            border-top: 1px solid var(--rule);\n            border-bottom: 1px solid rgba(245, 166, 35, 0.38);\n            padding: 9px 0;\n        }\n\n        .status-inner {\n            display: flex;\n            align-items: center;\n            gap: 14px;\n        }\n\n        .status-today {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 8.5px;\n            text-transform: uppercase;\n            letter-spacing: 0.14em;\n            color: var(--gold);\n            white-space: nowrap;\n            flex-shrink: 0;\n        }\n\n        .status-pipe {\n            width: 1px;\n            height: 12px;\n            background: rgba(245, 166, 35, 0.55);\n            flex-shrink: 0;\n        }\n\n        .status-facts {\n            font-family: 'Manrope', sans-serif;\n            font-size: 8.5px;\n            color: var(--secondary);\n            line-height: 1.55;\n            flex: 1;\n        }\n\n        /* ─── MILESTONE NODES ──────────────────────────────────── */\n\n        .node {\n            position: absolute;\n            bottom: 0;\n            display: flex;\n            flex-direction: column;\n            align-items: flex-start;\n        }\n\n        .node-date {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 7.5px;\n            text-transform: uppercase;\n            letter-spacing: 0.09em;\n            color: var(--secondary);\n            align-self: center;\n            margin-bottom: 4px;\n            white-space: nowrap;\n            opacity: 0.8;\n        }\n\n        .node-dot {\n            width: 9px;\n            height: 9px;\n            border-radius: 50%;\n            background: var(--violet);\n            flex-shrink: 0;\n            align-self: center;\n            position: relative;\n            z-index: 2;\n        }\n\n        .node-body {\n            display: flex;\n            gap: 3px;\n            align-items: flex-start;\n            margin-top: 5px;\n            margin-bottom: 4px;\n            width: 100%;\n        }\n\n        .node-num {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 8px;\n            font-weight: 700;\n            color: var(--gold);\n            flex-shrink: 0;\n            line-height: 1.5;\n        }\n\n        .node-name {\n            font-family: 'Manrope', sans-serif;\n            font-size: 10px;\n            font-weight: 600;\n            color: var(--white);\n            line-height: 1.35;\n        }\n\n        .node--wide .node-name {\n            font-size: 11px;\n        }\n\n        .node-tick {\n            flex-shrink: 0;\n            width: 1px;\n            height: var(--tick-h, 24px);\n            background: rgba(139, 92, 246, 0.28);\n            align-self: center;\n        }\n\n        /* Revenue node modifier */\n        .node--revenue {\n            bottom: auto;\n            top: 0;\n        }\n\n        .node--revenue .node-dot {\n            background: var(--gold);\n        }\n\n        .node--revenue .node-tick {\n            background: rgba(245, 166, 35, 0.28);\n        }\n\n        /* Bridge node (on the axis spine) */\n        .axis-col--bridge { color: transparent; }\n\n        .bridge-node {\n            position: absolute;\n            left: 50%;\n            transform: translateX(-50%);\n            bottom: -35px; /* centers 14px dot on axis: -(28px down-line + 7px half-dot) */\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            z-index: 5;\n        }\n\n        .bridge-line {\n            width: 1px;\n            background: rgba(139, 92, 246, 0.55);\n            flex-shrink: 0;\n        }\n\n        .bridge-line--up   { height: 22px; }\n        .bridge-line--down { height: 28px; }\n\n        .bridge-dot {\n            width: 14px;\n            height: 14px;\n            border-radius: 50%;\n            background: var(--violet);\n            flex-shrink: 0;\n            position: relative;\n            z-index: 3;\n        }\n\n        .bridge-dot::after {\n            content: '';\n            position: absolute;\n            inset: -4px;\n            border-radius: 50%;\n            border: 1.5px solid rgba(139, 92, 246, 0.45);\n        }\n\n        /* Bridge label — absolute child of .bridge-node, right of dot */\n        .bridge-label {\n            position: absolute;\n            left: calc(100% + 10px); /* 100% = bridge-node width (~14px) */\n            top: 29px;              /* up-line(22) + dot-half(7) = dot center */\n            transform: translateY(-50%);\n            width: 120px;\n        }\n\n        .bridge-date {\n            display: block;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 7.5px;\n            text-transform: uppercase;\n            letter-spacing: 0.09em;\n            color: var(--secondary);\n            opacity: 0.8;\n            margin-bottom: 3px;\n        }\n\n        .bridge-body {\n            display: flex;\n            gap: 3px;\n            align-items: flex-start;\n        }\n\n        /* ─── §4 DETAIL TABLE ───────────────────────────────── */\n\n        .detail-section {\n            padding: 56px 0;\n            border-bottom: 1px solid var(--rule);\n        }\n\n        .section-label {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9px;\n            text-transform: uppercase;\n            letter-spacing: 0.16em;\n            color: var(--secondary);\n            margin-bottom: 24px;\n            display: block;\n        }\n\n        .detail-table {\n            width: 100%;\n            border-collapse: collapse;\n            table-layout: fixed;\n        }\n\n        .detail-table col.col-left  { width: 36%; }\n        .detail-table col.col-right { width: 64%; }\n\n        .detail-table thead tr {\n            border-top: 2px solid var(--gold);\n            border-bottom: 1px solid var(--rule);\n        }\n\n        .detail-table th {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9px;\n            text-transform: uppercase;\n            letter-spacing: 0.15em;\n            color: var(--gold);\n            padding: 10px 16px 10px 0;\n            text-align: left;\n            font-weight: 500;\n        }\n\n        .detail-table th.th-right { padding-left: 20px; }\n\n        .detail-table tbody tr {\n            border-bottom: 1px solid var(--rule);\n        }\n\n        .detail-table tbody td {\n            padding: 14px 16px 14px 0;\n            vertical-align: top;\n        }\n\n        .detail-table tbody td.td-right {\n            padding-left: 20px;\n            padding-right: 0;\n        }\n\n        .ms-header {\n            display: flex;\n            align-items: baseline;\n            gap: 6px;\n            margin-bottom: 4px;\n        }\n\n        .ms-num {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9px;\n            font-weight: 700;\n            color: var(--gold);\n            flex-shrink: 0;\n        }\n\n        .ms-date {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9px;\n            color: var(--secondary);\n            flex-shrink: 0;\n        }\n\n        .ms-name {\n            font-family: 'Manrope', sans-serif;\n            font-size: 12px;\n            font-weight: 600;\n            color: var(--white);\n            line-height: 1.4;\n        }\n\n        .ms-why {\n            font-family: 'Manrope', sans-serif;\n            font-size: 12px;\n            color: var(--white);\n            line-height: 1.65;\n        }\n\n        .arg-tag {\n            display: block;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 8px;\n            text-transform: uppercase;\n            letter-spacing: 0.1em;\n            color: var(--violet);\n            margin-top: 6px;\n        }\n\n        /* T2 trigger row — gold left border */\n        .row-t2 td:first-child {\n            border-left: 2px solid var(--gold);\n            padding-left: 12px;\n        }\n\n        /* Bridge row — gold outer + violet inset (double stripe) */\n        .row-bridge td:first-child {\n            border-left: 2px solid var(--gold);\n            box-shadow: inset 2px 0 0 var(--violet);\n            padding-left: 12px;\n        }\n\n        /* ─── §5 Y1+ CALLOUT ─────────────────────────────────── */\n\n        .y1-section {\n            padding: 56px 0 72px;\n        }\n\n        .y1-panel {\n            border-left: 2px solid var(--rose);\n            background: var(--surface);\n            padding: 24px 28px;\n            border-radius: 2px;\n        }\n\n        .y1-tag {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9.5px;\n            text-transform: uppercase;\n            letter-spacing: 0.15em;\n            color: var(--rose);\n            display: block;\n            margin-bottom: 14px;\n        }\n\n        .y1-intro {\n            font-family: 'Manrope', sans-serif;\n            font-size: 13px;\n            color: var(--secondary);\n            line-height: 1.65;\n            margin-bottom: 14px;\n        }\n\n        .y1-list {\n            list-style: none;\n            display: flex;\n            flex-direction: column;\n            gap: 8px;\n            margin-bottom: 16px;\n        }\n\n        .y1-list li {\n            font-family: 'Manrope', sans-serif;\n            font-size: 13px;\n            color: var(--white);\n            line-height: 1.5;\n            display: flex;\n            gap: 10px;\n            align-items: flex-start;\n        }\n\n        .y1-list li::before {\n            content: '\\2014'; /* em-dash */\n            color: var(--gold);\n            flex-shrink: 0;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 11px;\n            line-height: 1.5;\n        }\n\n        .y1-close {\n            font-family: 'Manrope', sans-serif;\n            font-size: 13px;\n            font-style: italic;\n            color: var(--secondary);\n            line-height: 1.6;\n        }\n\n        /* ─── FOOTER ─────────────────────────────────────────── */\n        .site-footer {\n            border-top: 1px solid var(--violet);\n            padding: 24px 0 36px;\n        }\n        .footer-inner {\n            display: flex;\n            align-items: center;\n            justify-content: space-between;\n        }\n        .footer-wordmark { height: 18px; width: auto; opacity: 0.5; }\n        .footer-legal {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 9px;\n            letter-spacing: 0.14em;\n            text-transform: uppercase;\n            color: var(--secondary);\n        }\n\n        /* ─── PRINT RUNNING HEAD (hidden by default) ─────────── */\n        .print-running-head { display: none; }\n\n        /* ─── MOBILE TIMELINE ─────────────────────────────────── */\n        .timeline-mobile-wrap { display: none; }\n\n        .time-block {\n            border-left: 1px solid var(--rule);\n            padding: 14px 0 14px 16px;\n        }\n        .time-block + .time-block { border-top: 1px solid var(--rule); }\n\n        .time-block-header {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 10px;\n            text-transform: uppercase;\n            letter-spacing: 0.12em;\n            color: var(--gold);\n            margin-bottom: 14px;\n        }\n        .t2-window-label {\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 8px;\n            text-transform: uppercase;\n            letter-spacing: 0.12em;\n            color: var(--gold);\n            opacity: 0.7;\n            padding: 9px 0 9px 16px;\n            border-top: 1px solid rgba(245, 166, 35, 0.3);\n            border-bottom: 1px solid rgba(245, 166, 35, 0.3);\n            margin: 0 0 0;\n        }\n        .mob-node {\n            display: flex;\n            gap: 10px;\n            align-items: flex-start;\n            margin-bottom: 12px;\n        }\n        .mob-dot {\n            width: 8px; height: 8px;\n            border-radius: 50%;\n            background: var(--violet);\n            flex-shrink: 0;\n            margin-top: 3px;\n        }\n        .mob-dot--gold { background: var(--gold); }\n        .mob-dot--bridge { width: 10px; height: 10px; background: var(--violet); outline: 1.5px solid rgba(139,92,246,0.5); outline-offset: 2px; }\n        .mob-t2 .mob-dot,\n        .mob-t2 .mob-dot--bridge { outline: 2px solid var(--gold); outline-offset: 3px; }\n        .mob-t2 .mob-dot--gold { outline: 2px solid var(--gold); outline-offset: 3px; }\n        .mob-node-body { flex: 1; min-width: 0; }\n        .mob-both-tracks {\n            display: inline-block;\n            font-family: 'JetBrains Mono', monospace;\n            font-size: 7px;\n            text-transform: uppercase;\n            letter-spacing: 0.1em;\n            color: var(--violet);\n            border: 1px solid var(--violet);\n            padding: 1px 5px;\n            border-radius: 2px;\n            margin-bottom: 4px;\n        }\n        .mob-num { display: block; font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--secondary); margin-bottom: 2px; }\n        .mob-name { font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 600; color: var(--white); line-height: 1.35; }\n        .mob-t2-badge { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 7px; font-weight: 700; color: var(--gold); margin-top: 3px; }\n\n        /* ─── RESPONSIVE ─────────────────────────────────────── */\n        @media (max-width: 900px) {\n            .container { padding: 0 28px; }\n            .context-grid { grid-template-columns: 1fr; }\n            .page-title { font-size: 28px; }\n        }\n\n        @media (max-width: 768px) {\n            .container { padding: 0 20px; }\n            /* Header */\n            .header-chrome { flex-direction: column; align-items: flex-start; gap: 8px; }\n            .page-title { font-size: 24px; }\n            /* Status strip */\n            .status-inner { flex-direction: column; align-items: flex-start; gap: 6px; }\n            .status-pipe { display: none; }\n            /* Context */\n            .context-grid { grid-template-columns: 1fr; }\n            /* Timeline: hide desktop grid, show mobile view */\n            .track-banner { display: none; }\n            #timeline-desktop { display: none; }\n            .timeline-mobile-wrap { display: block; }\n            /* Original grid overrides (for safety) */\n            .track-row { grid-template-columns: 1fr; }\n            .track-row--product, .track-row--revenue { min-height: unset; }\n            .track-col { border-left: none; border-top: 1px dashed rgba(139, 92, 246, 0.14); padding: 10px 0 8px; min-height: 48px; }\n            .track-col:first-child { border-top: none; }\n            .col-label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); opacity: 0.65; margin-bottom: 4px; }\n            .axis-row { display: none; }\n            .spine-callout { text-align: left; padding: 6px 0; }\n            .tranche-bracket { flex: 0 0 100%; margin-left: 0; }\n            .tranche-row { display: none; }\n            .track-col--present, .axis-col--present { display: none; }\n            /* Detail table → card layout */\n            .detail-table colgroup { display: none; }\n            .detail-table thead { display: none; }\n            .detail-table tbody { display: block; }\n            .detail-table tbody tr { display: block; padding: 14px 0 14px 14px; border-bottom: 1px solid var(--rule); border-top: none; }\n            .detail-table tbody tr td { display: block; padding: 0 12px 8px 0; border: none; }\n            .detail-table tbody tr td.td-right { padding-left: 0; padding-top: 8px; border-top: 1px solid var(--rule); }\n            .row-t2 { border-left: 2px solid var(--gold); }\n            .row-bridge { box-shadow: inset 2px 0 0 var(--violet); }\n            .row-t2 td:first-child, .row-bridge td:first-child { border-left: none; box-shadow: none; padding-left: 0; }\n            /* Footer */\n            .footer-inner { flex-direction: column; gap: 10px; align-items: flex-start; }\n        }\n\n        @media (max-width: 600px) {\n            .container { padding: 0 16px; }\n            .page-title { font-size: 20px; }\n            .panel { padding: 18px 16px; }\n        }\n\n        /* ─── PRINT ──────────────────────────────────────────── */\n        @media print {\n            body { background-color: #fff; background-image: none; color: #000; }\n            .gold-rail { display: none; }\n            .print-running-head { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 8pt; text-transform: uppercase; letter-spacing: 0.08em; color: #888; padding-bottom: 8pt; margin-bottom: 16pt; border-bottom: 0.5pt solid #ccc; }\n            .site-header { border-bottom: 1px solid #ccc; }\n            .wordmark { filter: invert(1); }\n            .roadmap-badge { color: #333; border-color: #333; }\n            .date-stamp, .page-subtitle, .page-title { color: #000; }\n            .status-strip { border-color: #ccc; }\n ss=\"gold-rail\" aria-hidden=\"true\"><\u002Fdiv>\n\n    <!-- ═══════════════════════════════════════════════════════\n         §1  HEADER\n    ═══════════════════════════════════════════════════════ -->\n    <header class=\"site-header\">\n        <div class=\"container\">\n\n            <div class=\"header-chrome\">\n                <div class=\"header-left\">\n                    <img src=\"11fd40cd-567f-4190-a174-ea55a4b62e43\" alt=\"SPCTR\" class=\"wordmark\">\n                    <span class=\"roadmap-badge\">Roadmap<\u002Fspan>\n                <\u002Fdiv>\n                <span class=\"date-stamp\">MAY 2026<\u002Fspan>\n            <\u002Fdiv>\n\n            <h1 class=\"page-title\">What we ship before the next conversation<\u002Fh1>\n            <p class=\"page-subtitle\">Ten milestones across 18 months. Each tied to the structural argument it proves. Three of them gate the tranche-2 release.<\u002Fp>\n\n        <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ═══════════════════════════════════════════════════════\n         §2  CONTEXT BLOCK  (existing below)\n    ═══════════════════════════════════════════════════════ -->\n    <section class=\"context-section\" id=\"tranche-2-triggers\">\n        <div class=\"container\">\n            <div class=\"context-grid\">\n\n                <!-- Left: WHAT THIS DOC IS -->\n                <div class=\"panel panel--violet\">\n                    <span class=\"panel-label\">[WHAT THIS DOC IS]<\u002Fspan>\n                    <div class=\"panel-body\">\n                        <p>This document maps ten shipping milestones to the structural arguments they prove. It is a tranche instrument — not a product pitch.<\u002Fp>\n                        <p>Each milestone is dated, scoped, and tied to a specific proof of value that the SPCTR thesis requires to hold. Three of the ten are designated tranche-2 triggers. Two of three must close within a 12-month window to release the step-up.<\u002Fp>\n                        <p>The mechanism is explicit and bilateral — this is the roadmap the tranche framework is written around.<\u002Fp>\n                        <span class=\"anchor-note\">\n                            <strong>ANCHOR DEPLOYMENT<\u002Fstrong> — Amplified IM<br>\n                            Mobile-gaming agency · 75+ creators · 12-month dev agreement · Active\n                        <\u002Fspan>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- Right: THE TRANCHE-2 TRIGGERS -->\n                <div class=\"panel panel--gold\">\n                    <span class=\"panel-label panel-label--gold\">[THE TRANCHE-2 TRIGGERS]<\u002Fspan>\n\n                    <div class=\"raise-terms\">\n                        <div><span class=\"term-label\">INITIAL ·<\u002Fspan> $1M at $4.5–5.5M post-money cap · YC SAFE<\u002Fdiv>\n                        <div><span class=\"term-label\">TRANCHE 2 ·<\u002Fspan> $1–2M at $7–9M cap · 2-of-3 milestones in 12 months<\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <ul class=\"trigger-list\">\n                        <li class=\"trigger-item\">\n                            <span class=\"trigger-num\">1<\u002Fspan>\n                            <div class=\"trigger-body\">\n                                <div class=\"trigger-name\">Jonathan distribution addendum countersigned<\u002Fdiv>\n                                <div class=\"trigger-desc\">Converts the distribution-partner relationship to a signed instrument. Proves the agency-deployment channel is contractually secured more explicitly, not just relationship-based.<\u002Fdiv>\n                            <\u002Fdiv>\n                        <\u002Fli>\n                        <li class=\"trigger-item\">\n                            <span class=\"trigger-num\">2<\u002Fspan>\n                            <div class=\"trigger-body\">\n                                <div class=\"trigger-name\">First attribution case study published<\u002Fdiv>\n              <div class=\"node-date\">Q1–Q2 '27<\u002Fdiv>\n                        <\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <!-- Q2–Q3 2027 — node 09 -->\n                    <div class=\"track-col\" data-period=\"Q2–Q3 2027\">\n                        <span class=\"col-label\">Q2–Q3 2027<\u002Fspan>\n                        <div class=\"node node--revenue node--wide\" style=\"left: 8px; right: 8px; --tick-h: 20px;\">\n                            <div class=\"node-tick\"><\u002Fdiv>\n                            <div class=\"node-body\">\n                                <span class=\"node-num\">09<\u002Fspan>\n                                <span class=\"node-name\">First data licensing pilot closed<\u002Fspan>\n                            <\u002Fdiv>\n                            <div class=\"node-dot\"><\u002Fdiv>\n                            <div class=\"node-date\">Q2–Q3 '27<\u002Fdiv>\n                        <\u002Fdiv>\n                    <\u002Fdiv>\n\n                    <!-- Y2 sketch — empty -->\n                    <div class=\"track-col track-col--y2\" data-period=\"Y2 sketch\">\n                        <span class=\"col-label\">Y2 sketch<\u002Fspan>\n                    <\u002Fdiv>\n\n                <\u002Fdiv>\n\n            <\u002Fdiv>\n\n            <!-- Revenue track banner -->\n            <div class=\"track-banner track-banner--revenue\">\n                Revenue&nbsp;/&nbsp;Commercial Track&nbsp;—&nbsp;What SPCTR books\n            <\u002Fdiv>\n\n            <!-- Mobile timeline — populated by JS below -->\n            <div class=\"timeline-mobile-wrap\" id=\"timeline-mobile\"><\u002Fdiv>\n\n        <\u002Fdiv>\n    <\u002Fsection>\n    <!-- ═══════════════════════════════════════════════════════\n         §4  MILESTONE DETAIL TABLE\n    ═══════════════════════════════════════════════════════ -->\n    <section class=\"detail-section\" id=\"detail-table\">\n        <div class=\"container\">\n            <span class=\"section-label\">[MILESTONE DETAIL — WHAT EACH PROVES]<\u002Fspan>\n            <span class=\"ms-date\">Q3 2026<\u002Fspan><div class=\"ms-name\">Data-rights / ToS pass-through cleared<\u002Fdiv><span class=\"ms-date\">Q3 2026<\u002Fspan><div class=\"ms-name\">Jonathan distribution addendum countersigned<\u002Fdiv><span class=\"ms-date\">Q3–Q4 2026<\u002Fspan><div class=\"ms-name\">First attribution receipt productized<\u002Fdiv><span class=\"ms-date\">Q4 2026<\u002Fspan><div class=\"ms-name\">First Telegram Mini App live in test channel<\u002Fdiv><span class=\"ms-date\">Q4 2026<\u002Fspan><div class=\"ms-name\">3–5 paying agencies beyond Amplified IM at ≥$25K ACV<\u002Fdiv><span class=\"ms-date\">Q1 2027<\u002Fspan><div class=\"ms-name\">First Jonathan-channel CAC cohort tracked<\u002Fdiv><span class=\"ms-date\">Q1–Q2 2027<\u002Fspan><div class=\"ms-name\">First brand sponsorship pilot live<\u002Fdiv><span class=\"ms-date\">Q2–Q3 2027<\u002Fspan><div class=\"ms-name\">First data licensing pilot closed<\u002Fdiv><span class=\"ms-date\">Q2–Q3 2027<\u002Fspan><div class=\"ms-name\">First non-NXTE competition-platform adapter deployed<\u002Fdiv><table class=\"detail-table\">\n                <colgroup>\n                    <col class=\"col-left\">\n                    <col class=\"col-right\">\n                <\u002Fcolgroup>\n                <thead>\n                    <tr>\n                        <th>Milestone<\u002Fth>\n                        <th class=\"th-right\">Why it matters<\u002Fth>\n                    <\u002Ftr>\n                <\u002Fthead>\n                <tbody>\n\n                    <tr id=\"01-data-rights\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Unlocks Stream 5 data licensing path; without this clearance the long-term data-licensing revenue line cannot ship.<\u002Fp>\n                            <span class=\"arg-tag\">[VALIDATES STREAM 5 LEGAL PATH]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr class=\"row-t2\" id=\"02-jonathan-addendum\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Activates the @Crypto–NXTE LOI engineering team and converts a key channel dependency into a signed obligation. Tranche-2 trigger.<\u002Fp>\n                            <span class=\"arg-tag\">[TRANCHE-2 TRIGGER]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr class=\"row-t2 row-bridge\" id=\"03-attribution-case-study\">\n                        <td>\n                            <div class=\"ms-header\">\n                                <span class=\"ms-num\">03<\u002Fspan>\n                                <span class=\"ms-date\">Q3 2026<\u002Fspan>\n                            <\u002Fdiv>\n                            <div class=\"ms-name\">First Amplified IM attribution case study published<\u002Fdiv>\n                        <\u002Ftd>\n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">A concrete proof artifact: measurable creator-to-brand attribution from a live agency roster running on SPCTR. Doubles as a portable, brand-side re-usable artifact.<\u002Fp>\n                            <span class=\"arg-tag\">[TRANCHE-2 TRIGGER · VALIDATES ARG 3]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr id=\"04-attribution-receipt\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Turns the case study from a one-off PDF into a repeatable, shareable productized artifact — shows the attribution receipt working across brand and agency workflows.<\u002Fp>\n                            <span class=\"arg-tag\">[VALIDATES ARG 3]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr id=\"05-telegram-mini-app\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Validates that the LOI engineering team ships at expected velocity on the integrated build.<\u002Fp>\n                            <span class=\"arg-tag\">[VALIDATES LOI EXECUTION]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr class=\"row-t2\" id=\"06-paying-agencies\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Converts the anchor customer into a pattern. Demonstrates outbound sales motion and non-anchor pricing power. Tranche-2 trigger (a).<\u002Fp>\n                            <span class=\"arg-tag\">[TRANCHE-2 TRIGGER · ANCHOR → PATTERN]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr id=\"07-cac-cohort\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Provides first CAC evidence for the Telegram acquisition hypothesis and informs Stream 4 viability.<\u002Fp>\n                            <span class=\"arg-tag\">[VALIDATES CAC HYPOTHESIS]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr id=\"08-brand-sponsorship\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Initial commercial validation of the verified-attribution PMF claim — the central hypothesis the raise funds testing.<\u002Fp>\n                            <span class=\"arg-tag\">[VALIDATES RISK 2]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr id=\"09-data-licensing\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">First external paid test of the data-licensing line.<\u002Fp>\n                            <span class=\"arg-tag\">[INITIAL STREAM 5 COMMERCIAL VALIDATION]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                    <tr id=\"10-competition-platform-adapter\">\n                                \n                            \n                            \n                        \n                        <td class=\"td-right\">\n                            <p class=\"ms-why\">Proves the canonical-measurement-standard claim by replicating the reporting schema across a second competition-platform partner (LeagueOS, LeagueSpot, or AI coaching ecosystem). Distinguishes \"creator analytics SaaS\" from \"category measurement infrastructure.\"<\u002Fp>\n                            <span class=\"arg-tag\">[VALIDATES ARG 4]<\u002Fspan>\n                        <\u002Ftd>\n                    <\u002Ftr>\n\n                <\u002Ftbody>\n            <\u002Ftable>\n        <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══════════════════════════════════════════════════════\n         §5  WHAT COMES AFTER Y1\n    ═══════════════════════════════════════════════════════ -->\n    <section class=\"y1-section\" id=\"after-y1\">\n        <div class=\"container\">\n            <div class=\"y1-panel\">\n                <span class=\"y1-tag\">[SKETCH — NOT COMMITTED]<\u002Fspan>\n                <p class=\"y1-intro\">Roadmap beyond 18 months is sketched, not committed. The Y2–Y3 candidate additions:<\u002Fp>\n                <ul class=\"y1-list\">\n                    <li>Category baselines by game / region / tier<\u002Fli>\n                    <li>Agency benchmark consortium<\u002Fli>\n                    <li>Neutral measurement API for publisher / brand dashboards<\u002Fli>\n                    <li>Brand-side budget allocation dashboard<\u002Fli>\n                <\u002Ful>\n                <p class=\"y1-close\">None are scoped into the current raise — they're candidate expansion areas for a later financing, if the core thesis is validated.<\u002Fp>\n            <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fsection>\n    <!-- Mobile timeline JS -->\n    <script>\n    (function () {\n        var milestones = [\n            { num: '01', id: '01-data-rights',              period: 'Q3 2026',     group: 'Q3 2026',      track: 'product', t2: false, name: 'Data-rights / ToS pass-through cleared' },\n            { num: '02', id: '02-jonathan-addendum',         period: 'Q3 2026',     group: 'Q3 2026',      track: 'product', t2: true,  name: 'Jonathan distribution addendum countersigned' },\n            { num: '03', id: '03-attribution-case-study',    period: 'Q3 2026',     group: 'Q3 2026',      track: 'bridge',  t2: true,  name: 'First Amplified IM attribution case study published' },\n            { num: '04', id: '04-attribution-receipt',       period: 'Q3\\u2013Q4 2026', group: 'Q4 2026',  track: 'product', t2: false, name: 'First attribution receipt productized' },\n            { num: '05', id: '05-telegram-mini-app',         period: 'Q4 2026',     group: 'Q4 2026',      track: 'product', t2: false, name: 'First Telegram Mini App live in test channel' },\n            { num: '06', id: '06-paying-agencies',           period: 'Q4 2026',     group: 'Q4 2026',      track: 'revenue', t2: true,  name: '3\\u20135 paying agencies beyond Amplified IM at \\u2265$25K ACV' },\n            { num: '07', id: '07-cac-cohort',                period: 'Q1 2027',     group: 'Q1 2027',      track: 'product', t2: false, name: 'First Jonathan-channel CAC cohort tracked' },\n            { num: '08', id: '08-brand-sponsorship',         period: 'Q1\\u2013Q2 2027', group: 'Q1 2027',  track: 'revenue', t2: false, name: 'First brand sponsorship pilot live' },\n            { num: '09', id: '09-data-licensing',            period: 'Q2\\u2013Q3 2027', group: 'Q2\\u20133 2027', track: 'revenue', t2: false, name: 'First data licensing pilot closed' },\n            { num: '10', id: '10-competition-platform-adapter', period: 'Q2\\u2013Q3 2027', group: 'Q2\\u20133 2027', track: 'product', t2: false, name: 'First non-NXTE competition-platform adapter deployed' }\n        ];\n        var groups = ['Q3 2026', 'Q4 2026', 'Q1 2027', 'Q2\\u20133 2027'];\n\n        function build() {\n            var wrap = document.getElementById('timeline-mobile');\n            if (!wrap) return;\n            wrap.innerHTML = '';\n            groups.forEach(function (g, gi) {\n                if (gi === 1) {\n                    var lbl = document.createElement('div');\n                    lbl.className = 't2-window-label';\n                    lbl.textContent = '\\u2195 TRANCHE 2 UNLOCK WINDOW \\u2195';\n                    wrap.appendChild(lbl);\n                }\n                var block = document.createElement('div');\n                block.className = 'time-block';\n                var hdr = document.createElement('div');\n                hdr.className = 'time-block-header';\n                hdr.textContent = g;\n                block.appendChild(hdr);\n                var nodes = milestones.filter(function (m) { return m.group === g; });\n                nodes.sort(function (a, b) {\n                    var order = { product: 0, bridge: 1, revenue: 2 };\n                    return order[a.track] - order[b.track];\n                });\n                nodes.forEach(function (m) {\n                    var row = document.createElement('div');\n                    row.className = 'mob-node' + (m.t2 ? ' mob-t2' : '');\n                    row.id = m.id + '-mob';\n                    var dot = document.createElement('div');\n                    dot.className = 'mob-dot' + (m.track === 'revenue' ? ' mob-dot--gold' : '') + (m.track === 'bridge' ? ' mob-dot--bridge' : '');\n                    row.appendChild(dot);\n                    var body = document.createElement('div');\n                    body.className = 'mob-node-body';\n                    if (m.track === 'bridge') {\n                        var pill = document.createElement('span');\n                        pill.className = 'mob-both-tracks';\n                        pill.textContent = 'BOTH TRACKS';\n                        body.appendChild(pill);\n                        var br = document.createElement('br');\n                        body.appendChild(br);\n                    }\n                    var numEl = document.createElement('span');\n                    numEl.className = 'mob-num';\n                    numEl.textContent = m.num + ' \\u00b7 ' + m.period;\n                    body.appendChild(numEl);\n                    var nameEl = document.createElement('div');\n                    nameEl.className = 'mob-name';\n                    nameEl.textContent = m.name;\n                    body.appendChild(nameEl);\n                    if (m.t2) {\n                        var badge = document.createElement('span');\n                        badge.className = 'mob-t2-badge';\n                        badge.textContent = 'T2';\n                        body.appendChild(badge);\n                    }\n                    row.appendChild(body);\n                    block.appendChild(row);\n                });\n                wrap.appendChild(block);\n            });\n        }\n\n        build();\n\n        function checkMobile() {\n            var desktop = document.getElementById('timeline-desktop');\n            var mobile  = document.getElementById('timeline-mobile');\n            var banners = document.querySelectorAll('.track-banner');\n            if (!desktop || !mobile) return;\n            var isMob = window.innerWidth < 768;\n            desktop.style.display = isMob ? 'none' : '';\n            mobile.style.display  = isMob ? 'block' : 'none';\n            banners.forEach(function (b) { b.style.display = isMob ? 'none' : ''; });\n        }\n\n        checkMobile();\n        window.addEventListener('resize', checkMobile);\n    })();\n    <\u002Fscript>\n\n    <!-- ═══════════════════════════════════════════════════════\n         §6  FOOTER\n    ═══════════════════════════════════════════════════════ -->\n    <footer class=\"site-footer\">\n        <div class=\"container\">\n            <div class=\"footer-inner\">\n                <img src=\"11fd40cd-567f-4190-a174-ea55a4b62e43\" alt=\"SPCTR\" class=\"footer-wordmark\">\n                <span class=\"footer-legal\">Confidential &nbsp;·&nbsp; Pre-Seed Raise &nbsp;·&nbsp; 2026<\u002Fspan>\n            <\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
